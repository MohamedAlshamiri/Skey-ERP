<div class="flex items-center justify-between gap-4 py-4 px-6 bg-slate-50 border-t border-slate-100 rounded-b-card-md w-full">
  <!-- Info Text (Arabic layout, right aligned) -->
  <div class="text-sm text-slate-500 font-cairo">
    عرض {{ getStartItem() }} إلى {{ getEndItem() }} من أصل {{ total }} {{ itemType }}
  </div>

  <!-- Pagination Buttons (left aligned in Arabic layout) -->
  <div class="flex items-center gap-1.5 direction-ltr">
    <!-- Next button (which goes left/lower in index if index-based, or standard arrows) -->
    <button
      type="button"
      (click)="selectPage(pageIndex + 1)"
      [disabled]="pageIndex >= totalPages"
      class="flex items-center justify-center w-8 h-8 rounded-lg border border-slate-200 bg-white text-slate-500 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed transition duration-150"
    >
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="size-4">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
      </svg>
    </button>

    <!-- Page numbers -->
    @for (page of pages; track page) {
    <button
      type="button"
      (click)="selectPage(page)"
      class="flex items-center justify-center w-8 h-8 rounded-lg font-semibold text-sm transition duration-150"
      [ngClass]="{
        'bg-brand-primary text-white hover:bg-brand-hover': page === pageIndex,
        'border border-slate-200 bg-white text-slate-600 hover:bg-slate-50': page !== pageIndex
      }"
    >
      {{ page }}
    </button>
    }

    <!-- Previous button -->
    <button
      type="button"
      (click)="selectPage(pageIndex - 1)"
      [disabled]="pageIndex <= 1"
      class="flex items-center justify-center w-8 h-8 rounded-lg border border-slate-200 bg-white text-slate-500 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed transition duration-150"
    >
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="size-4">
        <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
      </svg>
    </button>
  </div>
</div>
