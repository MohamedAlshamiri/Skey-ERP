<div class="flex items-center justify-between gap-4 px-5 py-3.5 border-t border-slate-100 bg-white">

  <!-- Left: nav buttons -->
  <div class="flex items-center gap-1">

    <!-- Prev (arrow right in RTL) -->
    <button
      type="button"
      (click)="selectPage(pageIndex - 1)"
      [disabled]="pageIndex <= 1"
      class="flex items-center justify-center w-7 h-7 rounded-lg border border-slate-200 bg-white text-slate-500 hover:bg-slate-50 disabled:opacity-40 disabled:cursor-not-allowed transition duration-150">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
        stroke="currentColor" class="size-3.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
      </svg>
    </button>

    <!-- Page numbers -->
    @for (page of pages; track page) {
    <button
      type="button"
      (click)="selectPage(page)"
      class="flex items-center justify-center w-7 h-7 rounded-lg text-sm font-semibold transition duration-150"
      [ngClass]="{
        'bg-brand text-white shadow-sm': page === pageIndex,
        'border border-slate-200 bg-white text-slate-600 hover:bg-slate-50': page !== pageIndex
      }">
      {{ page }}
    </button>
    }

    <!-- Next (arrow left in RTL) -->
    <button
      type="button"
      (click)="selectPage(pageIndex + 1)"
      [disabled]="pageIndex >= totalPages"
      class="flex items-center justify-center w-7 h-7 rounded-lg border border-slate-200 bg-white text-slate-500 hover:bg-slate-50 disabled:opacity-40 disabled:cursor-not-allowed transition duration-150">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
        stroke="currentColor" class="size-3.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
      </svg>
    </button>

  </div>

  <!-- Right: info text -->
  <p class="text-xs text-slate-400">
    عرض {{ getStartItem() }} إلى {{ getEndItem() }} من أصل {{ total }} {{ itemType }}
  </p>

</div>
