<div class="skey-input flex flex-col gap-1.5 text-right w-full">
    @if (label) {
    <label class="text-xs font-semibold text-slate-500">{{ label }}</label>
    }

    <div class="relative flex items-center">

        @if (hasRightIcon) {
        <span
            class="absolute start-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none flex items-center justify-center w-5 h-5"
            [innerHTML]="safeIconRight"></span>
        }

        <input [type]="isPasswordVisible ? 'text' : type" [placeholder]="placeholder" [disabled]="disabled"
            [ngModel]="value" (ngModelChange)="onInputModelChange($event)" (blur)="onTouched()"
            class="w-full rounded-xl border border-slate-200 bg-slate-50 py-2 text-sm text-slate-800 placeholder-slate-400 transition duration-200 focus:border-brand-primary focus:bg-white focus:ring-4 focus:ring-skyerp-100 outline-none disabled:bg-slate-100 disabled:text-slate-400 disabled:cursor-not-allowed"
            [ngClass]="{
        'ps-10': hasRightIcon,
        'ps-3': !hasRightIcon,
        'pe-10': hasLeftToggle,
        'pe-3': !hasLeftToggle
      }" />

        @if (type === 'password') {
        <button type="button" tabindex="-1" (click)="togglePasswordVisibility()"
            class="absolute end-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 focus:outline-none transition duration-150 flex items-center justify-center w-5 h-5 cursor-pointer">
            @if (isPasswordVisible) {
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="size-5">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
            </svg>
            } @else {
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="size-5">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            </svg>
            }
        </button>
        }
    </div>

    @if (helpText) {
    <span class="text-xs text-slate-500">{{ helpText }}</span>
    }
</div>
