<div class="bg-white border border-slate-100 rounded-card-lg p-6 shadow-soft-card transition-all duration-300"
  [ngClass]="{ 'hover:shadow-lg hover:-translate-y-0.5': hoverable, 'border-slate-200': bordered }">
  @if(title != undefined || title != null) {
  <div class="border-b border-slate-100 pb-4 mb-4">
    <h3 class="text-lg font-bold text-slate-800">{{ title }}</h3>
  </div>
  }
  <div>
    <ng-content></ng-content>
  </div>
</div>
