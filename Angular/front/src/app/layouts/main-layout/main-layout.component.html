<div class="min-h-screen bg-slate-50/50 flex flex-col font-cairo" dir="rtl">

    <!-- ═══ Top Dashboard Navigation Header (same style as Landing) ═══ -->
    <header class="bg-white/90 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">

            <!-- Right: Logo + Nav -->
            <div class="flex items-center gap-10">
                <!-- Logo -->
                <a routerLink="/dashboard" class="flex items-center gap-2">
                    <img src="/assets/logo.jpeg" class="w-28" alt="Skey ERP" />
                </a>

                <!-- Nav Links -->
                <nav class="hidden md:flex items-center gap-7">
                    <a routerLink="/dashboard"
                        routerLinkActive="text-brand font-bold border-b-2 border-brand-primary pb-0.5"
                        [routerLinkActiveOptions]="{exact: true}"
                        class="text-sm font-medium text-slate-500 hover:text-brand transition-colors">
                        Dashboard
                    </a>
                    <a routerLink="/users"
                        routerLinkActive="text-brand font-bold border-b-2 border-brand-primary pb-0.5"
                        [routerLinkActiveOptions]="{exact: true}"
                        class="text-sm font-medium text-slate-500 hover:text-brand transition-colors">
                        Users
                    </a>
                    <a routerLink="/inventory"
                        routerLinkActive="text-brand font-bold border-b-2 border-brand-primary pb-0.5"
                        [routerLinkActiveOptions]="{exact: true}"
                        class="text-sm font-medium text-slate-500 hover:text-brand transition-colors">
                        Inventory
                    </a>
                    <a routerLink="/reports"
                        routerLinkActive="text-brand font-bold border-b-2 border-brand-primary pb-0.5"
                        [routerLinkActiveOptions]="{exact: true}"
                        class="text-sm font-medium text-slate-500 hover:text-brand transition-colors">
                        Reports
                    </a>
                    <a routerLink="/settings"
                        routerLinkActive="text-brand font-bold border-b-2 border-brand-primary pb-0.5"
                        [routerLinkActiveOptions]="{exact: true}"
                        class="text-sm font-medium text-slate-500 hover:text-brand transition-colors">
                        Settings
                    </a>
                </nav>
            </div>

            <!-- Left side: Search & Icons & Profile Avatar -->
            <div class="flex items-center gap-4">

                <!-- Search bar using custom input -->
                <skey-input
                    placeholder="بحث..."
                    iconRight="<svg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke-width='2' stroke='currentColor' class='size-4 text-slate-400'><path stroke-linecap='round' stroke-linejoin='round' d='m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z' /></svg>"
                    class="w-56">
                </skey-input>

                <!-- Bell Icon -->
                <button
                    class="relative w-6 h-6 rounded-full bg-white text-black hover:text-[#002d72] hover:border-slate-300 transition flex items-center justify-center cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8"
                        stroke="currentColor" class="size-4.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
                    </svg>
                </button>

                <!-- Help Icon -->
                <button
                    class="w-6 h-6 rounded-full bg-white text-black hover:text-[#002d72] hover:border-slate-300 transition flex items-center justify-center cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8"
                        stroke="currentColor" class="size-4.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 5.25h.008v.008H12v-.008Z" />
                    </svg>
                </button>

                <!-- Logout Icon -->
                <button
                    type="button"
                    (click)="logout()"
                    title="تسجيل الخروج"
                    aria-label="تسجيل الخروج"
                    class="w-6 h-6 rounded-full bg-white text-black hover:text-[#002d72] hover:border-slate-300 transition flex items-center justify-center cursor-pointer border-0 p-0">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8"
                        stroke="currentColor" class="size-4.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
                    </svg>
                </button>

                <!-- User Avatar -->
                <div class="w-8 h-8 rounded-full overflow-hidden border border-slate-200 cursor-pointer shrink-0">
                    <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=120&h=120&auto=format&fit=crop"
                        alt="User Profile Picture" class="w-full h-full object-cover" />
                </div>

            </div>
        </div>
    </header>

    <!-- ═══ Page Content Wrapper ═══ -->
    <main class="flex-1">
        <router-outlet></router-outlet>
    </main>

    <!-- ═══ Dashboard Footer ═══ -->
    <footer class="bg-[#f8fafc] border-t border-slate-200/50 py-5 text-slate-400 text-xs font-medium mt-auto">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4">

            <!-- Right side: Copyright (RTL order: copyright text, then Skey ERP logo) -->
            <div class="flex items-center gap-1.5 text-slate-400">
                <span class="font-black text-[#0f2963] text-[13px]">SKey ERP</span>
                <span>© Skey ERP Solutions. All rights reserved 2024</span>
            </div>

            <!-- Left side: Links -->
            <div class="flex items-center gap-6 text-slate-400 font-semibold">
                <a href="#" class="hover:text-[#002d72] transition">Documentation</a>
                <a href="#" class="hover:text-[#002d72] transition">Support</a>
                <a href="#" class="hover:text-[#002d72] transition">Terms of Service</a>
                <a href="#" class="hover:text-[#002d72] transition">Privacy Policy</a>
            </div>

        </div>
    </footer>

</div>
