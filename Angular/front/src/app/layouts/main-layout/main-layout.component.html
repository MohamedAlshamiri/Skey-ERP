<div class="min-h-screen bg-slate-50/50 flex flex-col font-cairo" dir="rtl">

    <!-- ═══ Top Dashboard Navigation Header ═══ -->
    <header class="bg-white border-b border-slate-200/80 sticky top-0 z-50 shadow-sm/5">
        <div class="max-w-7xl mx-auto px-6 h-14 flex items-center justify-between">

            <!-- Right side: Brand & Navigation Links (RTL order: Brand on rightmost, then links to its left) -->
            <div class="flex items-center gap-8">
                <!-- Brand -->
                <a routerLink="/" class="text-[19px] font-black text-brand tracking-tight hover:opacity-90 transition">
                    Skey ERP
                </a>

                <!-- Navigation Links -->
                <nav class="hidden md:flex items-center gap-6">
                    <a href="#" class="text-sm font-medium text-slate-400 hover:text-slate-800 transition-colors">
                        Dashboard
                    </a>
                    <a routerLink="/users"
                        routerLinkActive="text-brand-primary font-bold border-b-2 border-brand-primary"
                        [routerLinkActiveOptions]="{exact: true}"
                        class="text-sm font-medium text-slate-400 hover:text-slate-800 transition-colors py-4">
                        Users
                    </a>
                    <a href="#" class="text-sm font-medium text-slate-400 hover:text-slate-800 transition-colors">
                        Inventory
                    </a>
                    <a href="#" class="text-sm font-medium text-slate-400 hover:text-slate-800 transition-colors">
                        Reports
                    </a>
                    <a href="#" class="text-sm font-medium text-slate-400 hover:text-slate-800 transition-colors">
                        Settings
                    </a>
                </nav>
            </div>

            <!-- Left side: Search & Icons & Profile Avatar -->
            <div class="flex items-center gap-4">

                <!-- Search bar -->
                <div class="relative w-56">
                    <input type="text" placeholder="بحث..."
                        class="w-full rounded-full border-0 bg-slate-100/90 py-1.5 pr-9.5 pl-3.5 text-xs text-slate-700 placeholder-slate-400 focus:bg-slate-200/50 focus:ring-1 focus:ring-slate-300 outline-none transition duration-150" />
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                        stroke="currentColor"
                        class="absolute right-3.5 top-1/2 -translate-y-1/2 size-3.5 text-slate-400">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                    </svg>
                </div>

                <!-- Bell Icon -->
                <button
                    class="relative p-1 text-slate-400 hover:text-slate-600 transition flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8"
                        stroke="currentColor" class="size-4.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
                    </svg>
                </button>

                <!-- Help Icon -->
                <button class="p-1 text-slate-400 hover:text-slate-600 transition flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8"
                        stroke="currentColor" class="size-4.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 5.25h.008v.008H12v-.008Z" />
                    </svg>
                </button>

                <!-- User Avatar -->
                <div class="w-8 h-8 rounded-full overflow-hidden border border-slate-200 cursor-pointer shrink-0">
                    <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=120&h=120&auto=format&fit=crop"
                        alt="User Profile Picture" class="w-full h-full object-cover" />
                </div>

            </div>
        </div>
    </header>

    <!-- ═══ Page Content Wrapper ═══ -->
    <main class="flex-1">
        <router-outlet></router-outlet>
    </main>

</div>
