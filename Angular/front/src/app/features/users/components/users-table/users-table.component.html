<!-- Desktop Table -->
<div class="w-full overflow-x-auto">
  <table class="w-full border-collapse text-right">

    <!-- Header -->
    <thead>
      <tr class="bg-slate-50 border-b border-slate-100">
        <th class="px-5 py-3.5 text-xs font-semibold text-slate-500 text-right">اسم المستخدم</th>
        <th class="px-5 py-3.5 text-xs font-semibold text-slate-500 text-right">البريد الإلكتروني</th>
        <th class="px-5 py-3.5 text-xs font-semibold text-slate-500 text-right">الدور الوظيفي</th>
        <th class="px-5 py-3.5 text-xs font-semibold text-slate-500 text-right">الحالة</th>
        <th class="px-5 py-3.5 text-xs font-semibold text-slate-500 text-left">العمليات</th>
      </tr>
    </thead>

    <!-- Body -->
    <tbody>
      @for (user of users; track user.id) {
      <tr class="border-b border-slate-100 last:border-b-0 hover:bg-slate-50/60 transition-colors duration-100">

        <!-- Name + Avatar -->
        <td class="px-5 py-4">
          <div class="flex items-center gap-3">
            <div
              class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold shrink-0"
              [ngClass]="getAvatarClass(user.name)">
              {{ user.initials }}
            </div>
            <span class="font-semibold text-slate-800 text-sm">{{ user.name }}</span>
          </div>
        </td>

        <!-- Email -->
        <td class="px-5 py-4 text-sm text-slate-500">{{ user.email }}</td>

        <!-- Role -->
        <td class="px-5 py-4">
          <span
            class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium border border-slate-200/40"
            [ngClass]="getRoleClass(user.role)">
            {{ getRoleLabel(user.role) }}
          </span>
        </td>

        <!-- Status -->
        <td class="px-5 py-4">
          <span
            class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold border"
            [ngClass]="{
              'bg-green-50 text-green-700 border-green-200': user.status === 'active',
              'bg-red-50 text-red-600 border-red-200': user.status !== 'active'
            }">
            <span class="w-1.5 h-1.5 rounded-full" [ngClass]="{
              'bg-green-500': user.status === 'active',
              'bg-red-500': user.status !== 'active'
            }"></span>
            {{ user.status === 'active' ? 'نشط' : 'غير نشط' }}
          </span>
        </td>

        <!-- Actions -->
        <td class="px-5 py-4">
          <div class="flex items-center gap-3 justify-end">
            <!-- Edit -->
            <button
              (click)="edit.emit(user)"
              class="flex items-center justify-center text-slate-500 hover:text-[#002d72] transition duration-150 bg-transparent border-0 p-1 cursor-pointer"
              title="تعديل">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8"
                stroke="currentColor" class="size-5">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
              </svg>
            </button>
            <!-- Delete -->
            <button
              (click)="delete.emit(user.id)"
              class="flex items-center justify-center text-slate-400 hover:text-red-500 transition duration-150 bg-transparent border-0 p-1 cursor-pointer"
              title="حذف">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8"
                stroke="currentColor" class="size-5">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
              </svg>
            </button>
          </div>
        </td>

      </tr>
      } @empty {
      <tr>
        <td colspan="5" class="px-5 py-16 text-center text-sm text-slate-400">
          <div class="flex flex-col items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1"
              stroke="currentColor" class="size-10 text-slate-300">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z" />
            </svg>
            <span>لا توجد بيانات مستخدمين</span>
          </div>
        </td>
      </tr>
      }
    </tbody>
  </table>
</div>
