<!-- Header: Title right, Button left — no card wrapper -->
<div class="flex flex-col gap-3 md:flex-row md:items-start md:justify-between mb-2">

  <!-- Right: Title + subtitle -->
  <div class="text-right">
    <h2 class="text-[26px] font-black text-[#0f2963] tracking-tight">
      إدارة المستخدمين

    <p class="mt-1 text-sm text-slate-500">عرض وإدارة صلاحيات المستخدمين في النظام</p>

</div>
