<div class="flex flex-col text-right font-cairo w-full" dir="rtl">

  <!-- Form Body -->
  <form [formGroup]="userForm" (ngSubmit)="submit()" class="space-y-4">

    <!-- Name -->
    <skey-input label="اسم المستخدم" placeholder="أدخل اسم المستخدم الكامل" formControlName="name"></skey-input>

    <!-- Email -->
    <skey-input label="البريد الإلكتروني" placeholder="example@skeyerp.com" type="email"
      formControlName="email"></skey-input>

    <!-- Password (only in create mode) -->
    @if (mode === 'create') {
    <skey-input label="كلمة المرور" placeholder="أدخل كلمة المرور" type="password"
      formControlName="password"></skey-input>
    }

    <!-- Role & Status side-by-side -->
    <div class="grid grid-cols-2 gap-4">
      <!-- Role -->
      <skey-select label="الدور الوظيفي" placeholder="اختر الدور" [options]="roleOptions"
        formControlName="role"></skey-select>

      <!-- Status -->
      <skey-select label="الحالة" placeholder="اختر الحالة" [options]="statusOptions"
        formControlName="status"></skey-select>
    </div>

    <!-- Footer Actions (aligned left: blue button leftmost, then text cancel button) -->
    <div class="flex items-center justify-end gap-4 pt-4 border-t border-slate-100 mt-2">

      <!-- Cancel Button -->
      <button type="button" (click)="onClose()" [disabled]="loading"
        class="text-sm font-semibold text-slate-500 hover:text-slate-800 disabled:opacity-50 disabled:cursor-not-allowed transition cursor-pointer">
        إلغاء
      </button>

      <!-- Save Button -->
      <skey-button variant="primary" type="submit" [disabled]="userForm.invalid" [loading]="loading">
        حفظ البيانات
      </skey-button>

    </div>

  </form>

</div>
