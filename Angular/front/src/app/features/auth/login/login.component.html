<div class="flex flex-col min-h-screen" dir="rtl">

  <!-- ═══ Top Navigation Bar ═══ -->
  <nav class="flex items-center justify-between px-6 py-3 bg-transparent border-b border-slate-200/60">

    <!-- Right: Brand -->
    <span class="text-md font-extrabold text-brand tracking-tight">Skey ERP</span>

    <!-- Left: Help + Globe -->
    <div class="flex items-center gap-2">

      <button
        class="w-5 h-5 flex items-center justify-center rounded-full text-slate-500 hover:bg-white/60 hover:text-brand-primary transition">
        <!-- Help circle -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
          class="size-4.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 5.25h.008v.008H12v-.008Z" />
        </svg>
      </button>
      <button
        class="w-5 h-5 flex items-center justify-center rounded-full text-slate-500 hover:bg-white/60 hover:text-brand-primary transition">
        <!-- Globe -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
          class="size-4.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 21a9.004 9.004 0 0 0 8.716-6.747M12 21a9.004 9.004 0 0 1-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 0 1 7.843 4.582M12 3a8.997 8.997 0 0 0-7.843 4.582m15.686 0A11.953 11.953 0 0 1 12 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0 1 21 12c0 .778-.099 1.533-.284 2.253M3.284 14.253A8.959 8.959 0 0 1 3 12c0-1.605.42-3.113 1.157-4.418" />
        </svg>
      </button>
    </div>
  </nav>

  <!-- ═══ Main Content ═══ -->
  <main class="flex flex-1 items-center justify-center px-4 py-6">
    <div class="w-full max-w-[370px]">

      <!-- Login Card -->
      <skey-card>
        <div class="px-1 py-1">

          <!-- Logo -->
          <div class="flex justify-center mb-4">
            <div class="w-12 h-12 rounded-xl bg-brand flex items-center justify-center shadow-md shadow-brand/25">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" class="size-6">
                <path fill-rule="evenodd"
                  d="M12.516 2.17a.75.75 0 0 0-1.032 0 11.209 11.209 0 0 1-7.877 3.08.75.75 0 0 0-.722.515A12.74 12.74 0 0 0 2.25 9.75c0 5.942 4.064 10.933 9.563 12.348a.749.749 0 0 0 .374 0c5.499-1.415 9.563-6.406 9.563-12.348 0-1.39-.223-2.73-.635-3.985a.75.75 0 0 0-.722-.516l-.143.001c-2.996 0-5.717-1.17-7.734-3.08Zm3.094 8.016a.75.75 0 1 0-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 0 0-1.06 1.06l2.25 2.25a.75.75 0 0 0 1.14-.094l3.75-5.25Z"
                  clip-rule="evenodd" />
              </svg>
            </div>
          </div>

          <!-- Heading -->
          <div class="text-center mb-5">
            <h1 class="text-lg font-bold text-slate-800 mb-0.5">تسجيل الدخول</h1>
            <p class="text-xs text-slate-400">مرحباً بك في نظام Skey ERP المتكامل</p>
          </div>

          <!-- Form -->
          <form [formGroup]="loginForm" (ngSubmit)="submit()" class="space-y-3.5">

            <!-- Tenant ID -->
            <div>
              <label class="block text-xs font-semibold text-slate-600 mb-1">رقم العميل</label>
              <skey-input placeholder="أدخل رقم العميل الخاص بك" formControlName="tenantId"
                [iconRight]="buildingIcon"></skey-input>
            </div>

            <!-- Password -->
            <div>
              <label class="block text-xs font-semibold text-slate-600 mb-1">كلمة المرور</label>
              <skey-input placeholder="أدخل كلمة المرور" type="password" formControlName="password"
                [iconRight]="lockIcon"></skey-input>
            </div>

            <!-- Remember Me + Forgot -->
            <div class="flex items-center justify-between pt-0.5">
              <a href="#" class="text-xs font-semibold text-accent hover:text-accent-hover transition-colors">
                نسيت كلمة المرور؟
              </a>
              <label class="flex items-center gap-1.5 cursor-pointer select-none">
                <span class="text-xs text-slate-500">تذكرني</span>
                <input type="checkbox" formControlName="rememberMe"
                  class="w-3.5 h-3.5 rounded border-slate-300 accent-brand-primary cursor-pointer" />
              </label>
            </div>

            <br>

            <!-- Submit -->
            <skey-button class="w-full" variant="primary" type="submit" size="md" [block]="true" [disabled]="loginForm.invalid">
              تسجيل الدخول
            </skey-button>

          </form>

          <!-- Divider -->
          <div class="relative my-4">
            <div class="absolute inset-0 flex items-center">
              <div class="w-full border-t border-slate-100"></div>
            </div>
          </div>

          <!-- Register Link -->
          <p class="text-center text-xs text-slate-400">
            ليس لديك حساب؟
            <a routerLink="/auth/register" class="font-bold text-accent hover:text-accent-hover transition-colors mr-1">إنشاء حساب جديد</a>
          </p>

        </div>
      </skey-card>

      <!-- Security Note -->
      <div class="mt-5 flex items-center justify-center gap-2 text-xs text-slate-500">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
          class="size-4 shrink-0">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z" />
        </svg>
        <span>بياناتك مشفرة ومحمية بأعلى معايير الأمان</span>
      </div>

    </div>
  </main>

  <!-- ═══ Footer ═══ -->
  <footer class="px-6 py-5 border-t border-slate-200/60 bg-transparent">
    <div class="flex items-center justify-between ">
      <div class="">
        <span class="text-sm font-extrabold text-brand">Skey ERP</span>
        <!-- Right: Brand -->
        <p class="text-xs text-slate-400">©Skey ERP. All rights reserved 2024 </p>
      </div>
      <!-- Left: Brand + Links -->
      <div class="flex items-center gap-6">

        <div class="flex items-center gap-4 text-xs text-slate-500">
          <a href="#" class="hover:text-brand-primary transition">سياسة الخصوصية</a>
          <a href="#" class="hover:text-brand-primary transition">شروط الخدمة</a>
          <a href="#" class="hover:text-brand-primary transition">الأمان</a>
          <a href="#" class="hover:text-brand-primary transition">الدعم الفني</a>
        </div>
      </div>
    </div>
  </footer>

</div>
